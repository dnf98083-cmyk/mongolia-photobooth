<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인생네컷 — 자양교회 몽골 선교</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #581c87 0%, #9d174d 50%, #be123c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header { text-align: center; color: white; }
    .header p { font-size: 0.75rem; letter-spacing: 0.15em; color: #fce7f3; margin-bottom: 6px; }
    .header h1 { font-size: 2.5rem; font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .header small { font-size: 0.85rem; color: #fce7f3; display: block; margin-top: 4px; }
    img#strip {
      max-width: 260px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 3px solid rgba(255,255,255,0.2);
    }
    .btn-download {
      background: white;
      color: #581c87;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      display: block;
      width: 100%;
      max-width: 260px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    .btn-download:active { transform: scale(0.96); }
    .notice {
      color: #fce7f3;
      font-size: 0.75rem;
      text-align: center;
      line-height: 1.6;
    }
    #loading { color: white; font-size: 1rem; }
    #error { color: #fca5a5; font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <p>자양교회 몽골 선교</p>
    <h1>인생네컷</h1>
    <small>사진을 저장하세요</small>
  </div>

  <p id="loading">사진 불러오는 중...</p>
  <p id="error" style="display:none">사진을 불러올 수 없습니다</p>

  <img id="strip" src="" alt="인생네컷" style="display:none"
    onload="document.getElementById('loading').style.display='none'; this.style.display='block';"
    onerror="document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block';"
  />

  <a id="dl" class="btn-download" href="#" style="display:none">
    📥 사진 저장하기
  </a>

  <p class="notice">
    사진을 꾹 눌러서 저장하거나<br>아래 버튼을 눌러주세요
  </p>

  <script>
    const params = new URLSearchParams(location.search);
    const imgUrl = params.get('img');
    if (imgUrl) {
      const img = document.getElementById('strip');
      const dl = document.getElementById('dl');
      img.src = imgUrl;
      dl.href = imgUrl;
      dl.style.display = 'block';
      img.onload = function() {
        document.getElementById('loading').style.display = 'none';
        img.style.display = 'block';
      };
    } else {
      document.getElementById('loading').textContent = '잘못된 링크입니다';
    }
  </script>
</body>
</html>
